# ── Task ──────────────────────────────────────────────────────────────────────
task: walker-walk          # e.g. walker-walk, walker-run, cheetah-run
seed: 1
exp_name: default

# ── Training ──────────────────────────────────────────────────────────────────
# train_steps and episode_length are derived from action_repeat automatically.
# Override action_repeat here if you want to change the effective episode length.
# action_repeat: 2

# ── Planning (CEM) ────────────────────────────────────────────────────────────
iterations: 5
num_samples: 512
num_elites: 64
temperature: 0.5
momentum: 0.1
min_std: 0.05

# ── Learning ──────────────────────────────────────────────────────────────────
lr: 1e-3
batch_size: 512
horizon: 5
discount: 0.99
tau: 0.01                  # target network EMA coefficient
grad_clip_norm: 10
seed_steps: 4000

# Loss coefficients
reward_coef: 0.5
value_coef: 0.1
consistency_coef: 2

# Schedules (linear(start, end, steps))
std_schedule: linear(0.5, ${min_std}, 10000)
horizon_schedule: linear(1, ${horizon}, 10000)

# ── Architecture ──────────────────────────────────────────────────────────────
enc_dim: 256
mlp_dim: 512
latent_dim: 50

# ── Buffer ────────────────────────────────────────────────────────────────────
max_buffer_size: 1000000
per_alpha: 0.6
per_beta: 0.4

# ── Evaluation & Saving ───────────────────────────────────────────────────────
eval_freq: 20000           # env steps between evaluations
eval_episodes: 0          # set to 0 to disable eval
save_model: false          # save final model + buffer to logs dir

# ── Load pretrained (optional) ────────────────────────────────────────────────
# load_model: /path/to/model.pt
# load_buffer: /path/to/replay_buffer.pth
