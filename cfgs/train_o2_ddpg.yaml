# ── Task ──────────────────────────────────────────────────────────────────────
task:       cheetah-run
modality:   state
seed:       2
exp_name:   default

# ── Training ──────────────────────────────────────────────────────────────────
action_repeat:  1
episode_length: 1000
train_steps:    40000
seed_steps:     0
update_freq:    2

# ── Planning (standard CEM) ───────────────────────────────────────────────────
iterations:   5
num_samples:  512
num_elites:   64
mixture_coef: 0.05
min_std:      0.05
temperature:  0.5
momentum:     0.1

# ── Planning (latent CEM) ─────────────────────────────────────────────────────
latent_num_samples: 32
latent_num_elites:  8

# ── Learning ──────────────────────────────────────────────────────────────────
lr:             0.001
batch_size:     512
horizon:        5
discount:       0.99
tau:            0.01
grad_clip_norm: 10
rho:            0.5
kappa:          0.1

# Loss coefficients
reward_coef:      0.5
value_coef:       0.1
consistency_coef: 2

# Schedules
std_schedule:     linear(0.05, ${min_std}, 10000)
horizon_schedule: linear(5, ${horizon}, 10000)

# ── Architecture ──────────────────────────────────────────────────────────────
enc_dim:    256
mlp_dim:    512
latent_dim: 50

# ── Decoder ───────────────────────────────────────────────────────────────────
latent_action_dim:   128
decoder_init:        false
use_latent_state:    true
decoder_start_steps: 0
saturation_coeff:    0
use_is_weights:      false

# ── Update counts ─────────────────────────────────────────────────────────────
told_updates:    500
decoder_updates: 200
dcem_batch_size: 64
dcem_sampling_n: 0

# ── Buffer ────────────────────────────────────────────────────────────────────
max_buffer_size: 1000000
per_alpha: 0.6
per_beta:  0.4

# ── Load pretrained ───────────────────────────────────────────────────────────
load_model:  /gpu-data3/okonias/checkpoints/model.pth
load_buffer: /gpu-data3/okonias/checkpoints/replay_buffer.pth

# ── Evaluation & Saving ───────────────────────────────────────────────────────
eval_freq:     20000
eval_episodes: 0
save_model:    false
save_video:    false

# ── Logging ───────────────────────────────────────────────────────────────────
use_wandb:     false
wandb_project: none
wandb_entity:  none
